              <p><strong>Disclaimer:</strong> TheDailyJob पर दी गई जानकारी candidates की सुविधा के लिए सरल भाषा में तैयार की जाती है. Final decision लेने से पहले official notification और official website पर उपलब्ध details जरूर verify करें.</p>
              {schema}
              """
              return html_body, labels, location

          def job_schema(title, org, location, salary):
              data = {
                  "@context": "https://schema.org",
                  "@type": "JobPosting",
                  "title": title,
                  "description": f"{title} update with eligibility, important dates, application fee and official links.",
                  "datePosted": datetime.now(timezone.utc).date().isoformat(),
                  "validThrough": (datetime.now(timezone.utc) + timedelta(days=30)).strftime("%Y-%m-%dT23:59:59+00:00"),
                  "employmentType": "FULL_TIME",
                  "hiringOrganization": {"@type": "Organization", "name": org or "Government Department", "sameAs": SITE_BASE},
                  "jobLocation": {"@type": "Place", "address": {"@type": "PostalAddress", "addressRegion": location, "addressCountry": "IN"}},
                  "baseSalary": {"@type": "MonetaryAmount", "currency": "INR", "value": {"@type": "QuantitativeValue", "value": 0, "unitText": "MONTH"}},
              }
              return '<script type="application/ld+json">' + json.dumps(data, ensure_ascii=False) + "</script>"

          def content_hash(detail):
              raw = ARTICLE_STYLE_VERSION + "\n" + detail["title"] + "\n" + detail["text"][:5000] + "\n" + json.dumps(detail["links"], sort_keys=True)
              return hashlib.sha256(raw.encode("utf-8")).hexdigest()

          def blogger_post_is_live(service, post_id):
              if not post_id:
                  return False
              try:
                  post = service.posts().get(blogId=BLOG_ID, postId=post_id, fields="id,title,url,status").execute()
                  return bool(post.get("id") and post.get("url") and post.get("status", "LIVE") == "LIVE")
              except Exception as exc:
                  log(f"state post missing, will republish: {post_id} ({exc})")
                  return False

          def facebook_config():
              page_id_file = Path("config/facebook_page_id.txt")
              token_file = Path("config/facebook_page_access_token.txt")
              if not page_id_file.exists() or not token_file.exists():
                  return None, None
              page_id = page_id_file.read_text(encoding="utf-8").strip()
              token = token_file.read_text(encoding="utf-8").strip()
              if not page_id or not token:
                  return None, None
              return page_id, token

          def share_to_facebook(title, url, labels):
              page_id, token = facebook_config()
              if not page_id or not token or not url:
                  return
              posted = load_fb_posted()
              key = hashlib.sha256(url.encode("utf-8")).hexdigest()
              if posted.get(key):
                  log(f"facebook skip duplicate: {title}")
                  return
              message = (
                  f"{title}\n\n"
                  "Latest job update, admit card, result aur government exam information ke liye details yahan padhein.\n\n"
                  f"{url}\n\n"
                  "#TheDailyJob #SarkariJob #LatestJobs"
              )
              try:
                  response = requests.post(
                      f"https://graph.facebook.com/v20.0/{page_id}/feed",
                      data={"message": message, "link": url, "access_token": token},
                      timeout=30,
                  )
                  if response.status_code >= 400:
                      log(f"facebook ERROR {response.status_code}: {response.text[:300]}")
                      return
                  posted[key] = {
                      "title": title,
                      "url": url,
                      "facebook_response": response.json(),
                      "posted_at": datetime.now(timezone.utc).isoformat(),
                  }
                  save_fb_posted(posted)
                  log(f"facebook posted: {title}")
              except Exception as exc:
                  log(f"facebook ERROR {title}: {exc}")

          def publish_or_update(service, state, job, detail):
              key = hashlib.sha256(job["url"].encode("utf-8")).hexdigest()
              h = content_hash(detail)
              old = state["jobs"].get(key)
              old_post_id = old.get("blogger_post_id") if old else None
              if old and old.get("hash") == h and old_post_id:
                  log(f"skip duplicate unchanged: {detail['title']}")
                  return "skip"
              old_live = blogger_post_is_live(service, old_post_id) if old_post_id else False
              body, labels, location = article_html(detail)
              title = make_title(detail["title"])
              search_description = meta_description(title, labels, location)
              post = {
                  "kind": "blogger#post",
                  "blog": {"id": BLOG_ID},
                  "title": title,
                  "content": body,
                  "labels": labels,
                  "customMetaData": search_description,
              }
              if old and old_post_id and old_live:
                  service.posts().update(blogId=BLOG_ID, postId=old_post_id, body=post, fetchBody=False).execute()
                  action = "updated"
              else:
                  created = service.posts().insert(blogId=BLOG_ID, body=post, isDraft=False, fetchBody=False).execute()
                  old = old or {}
                  old["blogger_post_id"] = created["id"]
                  old["blogger_url"] = created.get("url")
                  action = "published"
              old.update({"hash": h, "source_url": job["url"], "title": title, "updated_at": datetime.now(timezone.utc).isoformat()})
              state["jobs"][key] = old
              save_state(state)
              log(f"{action}: {title}")
              if action == "published":
                  share_to_facebook(title, old.get("blogger_url"), labels)
              return action

          def main():
              parser = argparse.ArgumentParser()
              parser.add_argument("--limit", type=int, default=10)
              parser.add_argument("--source-url", default="")
              args = parser.parse_args()
              state = load_state()
              service = blogger_service()
              done = 0
              jobs = []
              if args.source_url.strip():
                  jobs.append({"title": "Priority Source Update", "url": clean_url(args.source_url.strip())})
              jobs.extend(discover_jobs(limit_pool=max(args.limit * 4, 50)))
              seen_jobs = set()
              for job in jobs:
                  if not job.get("url") or job["url"] in seen_jobs:
                      continue
                  seen_jobs.add(job["url"])
                  if done >= args.limit:
                      break
                  try:
                      detail = parse_detail(job)
                      result = publish_or_update(service, state, job, detail)
                      if result in {"published", "updated"}:
                          done += 1
                          time.sleep(1)
                  except Exception as exc:
                      err = str(exc)
                      log(f"ERROR {job['url']}: {err}")
                      if "rateLimitExceeded" in err or "Resource has been exhausted" in err or "HttpError 429" in err:
                          log("Blogger API quota/rate limit reached; stopping this run safely. Remaining posts will continue in the next scheduled run.")
                          break
              log(f"run complete, changed={done}")

          if __name__ == "__main__":
              main()
          PY

      - name: Run Blogger autopost
        run: python autopost_standalone.py --limit "${{ github.event.inputs.limit || '10' }}" --source-url "${{ github.event.inputs.source_url || '' }}"

      - name: Save duplicate state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: thedailyjob-state-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopost-state-${{ github.run_id }}
          path: data/
