name: TheDailyJob Blogger Auto Post

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum posts to fetch/publish in this run"
        required: false
        default: "10"
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: thedailyjob-blogger-autopost
  cancel-in-progress: false

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download project source
        run: |
          set -euo pipefail
          curl -L -o source.zip https://github.com/ashooooook/job-portal-system/archive/refs/heads/main.zip
          unzip -q source.zip
          mv job-portal-system-main project

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: project/requirements.txt

      - name: Install dependencies
        run: cd project && python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Restore duplicate/post database
        uses: actions/cache/restore@v4
        with:
          path: project/data
          key: thedailyjob-data-${{ github.run_id }}
          restore-keys: |
            thedailyjob-data-

      - name: Prepare Blogger and AI config
        shell: bash
        env:
          BLOGGER_CLIENT_SECRET_JSON: ${{ secrets.BLOGGER_CLIENT_SECRET_JSON }}
          BLOGGER_TOKEN_JSON: ${{ secrets.BLOGGER_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          cd project
          mkdir -p config data logs

          if [ -z "${BLOGGER_CLIENT_SECRET_JSON}" ]; then
            echo "Missing GitHub secret: BLOGGER_CLIENT_SECRET_JSON"
            exit 1
          fi
          if [ -z "${BLOGGER_TOKEN_JSON}" ]; then
            echo "Missing GitHub secret: BLOGGER_TOKEN_JSON"
            exit 1
          fi

          printf '%s' "${BLOGGER_CLIENT_SECRET_JSON}" > config/google_client_secret.json
          printf '%s' "${BLOGGER_TOKEN_JSON}" > config/blogger_token.json

          cat > .env <<EOF
          APP_ENV=production
          LOG_LEVEL=INFO
          DATABASE_URL=sqlite:///data/job_portal.db

          BLOGGER_BLOG_ID=7244953776987697859
          BLOGGER_CLIENT_SECRETS_FILE=config/google_client_secret.json
          BLOGGER_TOKEN_FILE=config/blogger_token.json
          PUBLISH_MODE=publish
          SCHEDULE_AFTER_MINUTES=0

          AI_PROVIDER=gemini
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GEMINI_MODEL=gemini-1.5-flash
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENAI_MODEL=gpt-4.1-mini
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_MODEL=deepseek-chat
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          OPENROUTER_MODEL=deepseek/deepseek-chat-v3-0324:free
          OPENROUTER_BASE_URL=https://openrouter.ai/api/v1

          SITE_NAME=TheDailyJob
          SITE_BASE_URL=https://thedailyjob.in
          DEFAULT_FEATURED_IMAGE=
          GOOGLE_ANALYTICS_ID=
          GOOGLE_SEARCH_CONSOLE_VERIFICATION=

          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          FACEBOOK_PAGE_ACCESS_TOKEN=
          FACEBOOK_PAGE_ID=
          EOF

      - name: Run Blogger autopost
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: cd project && python -m app.main --limit "${{ github.event.inputs.limit || '10' }}"

      - name: Save duplicate/post database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: project/data
          key: thedailyjob-data-${{ github.run_id }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autopost-logs-${{ github.run_id }}
          path: project/logs/
