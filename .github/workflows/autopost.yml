              fee = smart_fee(text, fee_section or extract([r"(?:Application Fee|Fee|आवेदन शुल्क)[: -]+([^.]{3,220})"], text))
              age = age_section or extract([r"(?:Age Limit|आयु सीमा)[: -]+([^.]{3,220})"], text)
              selection = selection_section or extract([r"(?:Selection Process|चयन प्रक्रिया)[: -]+([^.]{3,220})"], text)
              salary = salary_section or extract([r"(?:Salary|Pay Scale|वेतन)[: -]+([^.]{3,220})"], text, "As per official rules")
              dates_map = detail_map(lines)
              kind = update_kind(title, labels)
              intro = human_intro(title, kind, org, posts, qualification, location)
              overview = f"""
