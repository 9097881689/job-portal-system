name: TheDailyJob Blogger Auto Post

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum new/updated posts in this run"
        required: false
        default: "10"
      source_url:
        description: "Optional source URL to process first"
        required: false
        default: ""
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: thedailyjob-blogger-autopost
  cancel-in-progress: false

jobs:
  autopost:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 google-api-python-client google-auth google-auth-oauthlib python-dateutil

      - name: Restore duplicate state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: thedailyjob-state-${{ github.run_id }}
          restore-keys: |
            thedailyjob-state-

      - name: Prepare secrets
        shell: bash
        env:
          BLOGGER_CLIENT_SECRET_JSON: ${{ secrets.BLOGGER_CLIENT_SECRET_JSON }}
          BLOGGER_TOKEN_JSON: ${{ secrets.BLOGGER_TOKEN_JSON }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p config data logs
          test -n "$BLOGGER_CLIENT_SECRET_JSON"
          test -n "$BLOGGER_TOKEN_JSON"
          printf '%s' "$BLOGGER_CLIENT_SECRET_JSON" > config/google_client_secret.json
          printf '%s' "$BLOGGER_TOKEN_JSON" > config/blogger_token.json
          if [ -n "${FACEBOOK_PAGE_ID:-}" ] && [ -n "${FACEBOOK_PAGE_ACCESS_TOKEN:-}" ]; then
            printf '%s' "$FACEBOOK_PAGE_ID" > config/facebook_page_id.txt
            printf '%s' "$FACEBOOK_PAGE_ACCESS_TOKEN" > config/facebook_page_access_token.txt
          fi

      - name: Write standalone autoposter
        shell: bash
        run: |
          cat > autopost_standalone.py <<'PY'
          import argparse
          import hashlib
          import html
          import json
          import os
          import re
          import sys
          import time
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          from urllib.parse import urljoin, urlparse

          import requests
          from bs4 import BeautifulSoup
          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          BLOG_ID = "7244953776987697859"
          SITE_NAME = "TheDailyJob.in"
          SITE_BASE = "https://www.thedailyjob.in"
          SOURCE_BASE = "https://sarkariresult.com.cm/"
          SOURCE_PAGES = [
              SOURCE_BASE,
              urljoin(SOURCE_BASE, "latest-jobs/"),
              urljoin(SOURCE_BASE, "result/"),
              urljoin(SOURCE_BASE, "admit-card/"),
              urljoin(SOURCE_BASE, "answer-key/"),
              urljoin(SOURCE_BASE, "admission/"),
              urljoin(SOURCE_BASE, "syllabus/"),
          ]
          STATE_FILE = Path("data/processed_jobs.json")
          SCOPES = ["https://www.googleapis.com/auth/blogger"]
          FB_POSTED_FILE = Path("data/facebook_posted.json")
          UA = "Mozilla/5.0 (compatible; TheDailyJobBot/1.0; +https://www.thedailyjob.in)"
          ARTICLE_STYLE_VERSION = "human-detail-v8"
          BAD_DOMAINS = {
              "sarkariresult.com.cm",
              "www.sarkariresult.com.cm",
              "play.google.com",
              "x.com",
              "twitter.com",
              "www.facebook.com",
              "facebook.com",
              "t.me",
              "telegram.me",
          }

          STATE_NAMES = {
              "bihar": "Bihar", "uttar pradesh": "Uttar Pradesh", "up ": "Uttar Pradesh",
              "rajasthan": "Rajasthan", "madhya pradesh": "Madhya Pradesh", "mp ": "Madhya Pradesh",
              "maharashtra": "Maharashtra", "gujarat": "Gujarat", "jharkhand": "Jharkhand",
              "chhattisgarh": "Chhattisgarh", "haryana": "Haryana", "punjab": "Punjab",
              "delhi": "Delhi", "odisha": "Odisha", "west bengal": "West Bengal",
              "karnataka": "Karnataka", "tamil nadu": "Tamil Nadu", "kerala": "Kerala",
              "andhra pradesh": "Andhra Pradesh", "telangana": "Telangana", "assam": "Assam",
              "uttarakhand": "Uttarakhand", "himachal": "Himachal Pradesh",
          }

          def log(msg):
              print(datetime.now().strftime("%Y-%m-%d %H:%M:%S"), msg, flush=True)

          def fetch(url):
              r = requests.get(url, headers={"User-Agent": UA}, timeout=25)
              r.raise_for_status()
              return r.text

          def clean_text(value):
              value = html.unescape(value or "")
              value = re.sub(r"\s+", " ", value).strip()
              value = value.replace("…", "").replace("...", "")
              return value

          def remove_source_noise(value):
              value = clean_text(value)
              noise_patterns = [
                  r"Download\s+SarkariResult\s+App\s+Now",
                  r"WhatsApp\s+Telegram",
                  r"WhatsApp",
                  r"Telegram",
                  r"Sarkari Result(?:™|®)?",
                  r"SarkariResult(?:\\.Com\\.Cm)?",
                  r"You May Also Check\\s*:?\\s*[^.।\\n]{0,140}",
                  r"Join Our Whatsapp Channel",
                  r"Join Our Telegram Channel",
                  r"Follow us on\\s+[^.।\\n]{0,80}",
                  r"CRPF Constable Tradesman Recruitment 2026",
              ]
              for pat in noise_patterns:
                  value = re.sub(pat, " ", value, flags=re.I)
              value = re.sub(r"₹\s*([0-9])\s+([0-9]{2})(?=\D|$)", r"₹ \1\2", value)
              value = re.sub(r"Rs\.?\s*([0-9])\s+([0-9]{2})", r"Rs. \1\2", value, flags=re.I)
              value = re.sub(r"\\s+", " ", value).strip(" -|:;")
              return value

          def clean_url(value, base=SOURCE_BASE):
              href = html.unescape(value or "").strip()
              href = href.rstrip(".,;:)]}>\"'")
              href = urljoin(base, href)
              parsed = urlparse(href)
              if parsed.scheme not in {"http", "https"}:
                  return ""
              if not parsed.netloc:
                  return ""
              return href

          def slugify(text):
              text = clean_text(text).lower()
              text = re.sub(r"[^a-z0-9]+", "-", text)
              text = re.sub(r"-+", "-", text).strip("-")
              return text[:90] or "latest-job-update"

          def load_state():
              if STATE_FILE.exists():
                  return json.loads(STATE_FILE.read_text(encoding="utf-8"))
              return {"jobs": {}}

          def save_state(state):
              STATE_FILE.parent.mkdir(parents=True, exist_ok=True)
              STATE_FILE.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")

          def load_fb_posted():
              if FB_POSTED_FILE.exists():
                  try:
                      return json.loads(FB_POSTED_FILE.read_text(encoding="utf-8"))
                  except Exception:
                      return {}
              return {}

          def save_fb_posted(state):
              FB_POSTED_FILE.parent.mkdir(parents=True, exist_ok=True)
              FB_POSTED_FILE.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding="utf-8")

          def blogger_service():
              token_info = json.loads(Path("config/blogger_token.json").read_text(encoding="utf-8"))
              creds = Credentials.from_authorized_user_info(token_info, SCOPES)
              if creds.expired and creds.refresh_token:
                  creds.refresh(Request())
                  Path("config/blogger_token.json").write_text(creds.to_json(), encoding="utf-8")
              return build("blogger", "v3", credentials=creds, cache_discovery=False)

          def is_job_candidate(title, href):
              if not title or len(title) < 12:
                  return False
              parsed = urlparse(href)
              if parsed.netloc not in {"sarkariresult.com.cm", "www.sarkariresult.com.cm"}:
                  return False
              if parsed.path in {"", "/"}:
                  return False
              low = title.lower()
              href_low = href.lower()
              if any(x in low for x in ["privacy", "contact", "about", "telegram", "whatsapp", "tools"]):
                  return False
              keywords = [
                  "2026", "2025", "recruitment", "result", "admit", "answer key",
                  "online form", "vacancy", "exam", "apply", "merit list", "rank card",
                  "city details", "exam date", "notification", "syllabus"
              ]
              return any(x in low or x in href_low for x in keywords)

          def add_job(jobs, seen, title, href):
              href = clean_url(href)
              title = clean_text(title)
              if not href or href in seen or not is_job_candidate(title, href):
                  return False
              seen.add(href)
              jobs.append({"title": title, "url": href})
              return True

          def collect_page_links(page_url, jobs, seen, limit_pool):
              try:
                  soup = BeautifulSoup(fetch(page_url), "html.parser")
              except Exception as exc:
                  log(f"ERROR listing {page_url}: {exc}")
                  return
              for a in soup.find_all("a", href=True):
                  add_job(jobs, seen, a.get_text(" "), urljoin(page_url, a["href"]))
                  if len(jobs) >= limit_pool:
                      return

          def collect_wp_api(jobs, seen, limit_pool):
              for page in range(1, 5):
                  if len(jobs) >= limit_pool:
                      return
                  api_url = urljoin(SOURCE_BASE, f"wp-json/wp/v2/posts?per_page=100&page={page}")
                  try:
                      items = requests.get(api_url, headers={"User-Agent": UA}, timeout=25).json()
                  except Exception as exc:
                      log(f"ERROR wp api page {page}: {exc}")
                      return
                  if not isinstance(items, list) or not items:
                      return
                  for item in items:
                      title = clean_text(BeautifulSoup(item.get("title", {}).get("rendered", ""), "html.parser").get_text(" "))
                      href = item.get("link") or ""
                      add_job(jobs, seen, title, href)
                      if len(jobs) >= limit_pool:
                          return

          def discover_jobs(limit_pool=300):
              jobs = []
              seen = set()
              collect_wp_api(jobs, seen, limit_pool)
              if len(jobs) >= limit_pool:
                  log(f"discovered jobs={len(jobs)}")
                  return jobs
              for page_url in SOURCE_PAGES:
                  collect_page_links(page_url, jobs, seen, limit_pool)
                  if len(jobs) >= limit_pool:
                      log(f"discovered jobs={len(jobs)}")
                      return jobs
              log(f"discovered jobs={len(jobs)}")
              return jobs

          def parse_detail(job):
              soup = BeautifulSoup(fetch(job["url"]), "html.parser")
              title = clean_text((soup.find("h1") or soup.find("title") or "").get_text(" ")) or job["title"]
              title = title.replace("Sarkari Result", "").strip(" -|")
              body = soup.find("article") or soup.find("main") or soup.body or soup
              text = clean_text(body.get_text(" "))
              lines = [clean_text(x) for x in body.get_text("\n").splitlines()]
              lines = [remove_source_noise(x) for x in lines if x]
              lines = [x for x in lines if x and not re.search(r"download app|whatsapp|telegram|you may also check|sarkariresult", x, re.I)]
              text = remove_source_noise(" ".join(lines)) or remove_source_noise(text)
              links = extract_official_links(body, job["url"])
              return {"title": title, "text": text, "lines": lines, "links": links[:10]}

          def extract_official_links(body, base_url):
              links = []
              used = set()
              context = ""
              useful_words = ["official", "apply", "notification", "admit", "result", "answer key", "website", "notice", "download", "nats", "naps"]
              noise_words = ["whatsapp", "telegram", "mobile app", "instagram", "facebook", "youtube", "twitter", "x.com", "sarkariresult"]
              for el in body.find_all(["h2", "h3", "h4", "h5", "h6", "li", "p", "td", "th", "a"]):
                  if el.name == "a":
                      label = clean_text(el.get_text(" "))
                      final_label = label
                      if label.lower() in {"click here", "here", "open", "download", "view"} and context:
                          final_label = context
                      href = clean_url(el.get("href", ""), base_url)
                      host = urlparse(href).netloc.lower()
                      low_label = final_label.lower()
                      if not final_label or not href or href in used:
                          continue
                      if host in BAD_DOMAINS or any(bad in low_label for bad in noise_words):
                          continue
                      if href.startswith("javascript:") or href.startswith("#"):
                          continue
                      if any(k in low_label for k in useful_words) or any(k in host for k in ["gov.in", "nic.in", "bankofbaroda", "nats", "apprenticeshipindia"]):
                          used.add(href)
                          links.append({"label": final_label[:90], "url": href})
                  else:
                      txt = clean_text(el.get_text(" "))
                      low = txt.lower()
                      if txt and len(txt) <= 140 and not any(bad in low for bad in noise_words):
                          if any(k in low for k in useful_words):
                              context = txt
              return links

          def pick_labels(title):
              low = title.lower()
              labels = []
              if "result" in low:
                  labels += ["Results", "Result"]
              if "admit card" in low or "exam city" in low:
                  labels += ["Admit Card"]
              if "answer key" in low:
                  labels += ["Answer Key"]
              if any(x in low for x in ["railway", "rrb", "rpf"]):
                  labels += ["Railway Jobs"]
              if any(x in low for x in ["bank", "ibps", "sbi", "rbi"]):
                  labels += ["Bank Jobs"]
              if any(x in low for x in ["army", "navy", "air force", "defence", "bsf", "cisf", "crpf", "itbp"]):
                  labels += ["Defence Jobs"]
              if any(x in low for x in ["upsc", "ssc", "bpsc", "uppsc", "mppsc", "police", "teacher", "recruitment", "vacancy", "online form", "apply"]):
                  labels += ["Government Jobs", "Latest Jobs"]
              if not labels:
                  labels = ["Latest Jobs"]
              out = []
              for x in labels:
                  if x not in out:
                      out.append(x)
              return out

          def job_location(title, text):
              low = f"{title} {text[:2000]}".lower()
              for key, name in STATE_NAMES.items():
                  if key in low:
                      return name
              return "All India"

          def extract(patterns, text, default="Update Soon"):
              for p in patterns:
                  m = re.search(p, text, re.I)
                  if m:
                      return clean_text(m.group(1))[:220]
              return default

          def compact_value(value, default="Update Soon", limit=260):
              value = remove_source_noise(value)
              value = re.sub(r"\b(Click Here|Available Soon|More Details|Read More)\b", " ", value, flags=re.I)
              value = clean_text(value)
              return (value[:limit].strip() if value else default)

          def first_clean_match(text, patterns, default="Update Soon", limit=220):
              text = remove_source_noise(text)
              for pat in patterns:
                  m = re.search(pat, text, re.I)
                  if m:
                      return compact_value(m.group(1), default, limit)
              return default

          def section_text(lines, start_words, end_words, limit=700):
              start = -1
              for i, line in enumerate(lines):
                  low = line.lower()
                  if any(w in low for w in start_words):
                      start = i + 1
                      break
              if start < 0:
                  return ""
              out = []
              for line in lines[start:]:
                  low = line.lower()
                  if any(w in low for w in end_words):
                      break
                  if len(line) <= 2:
                      continue
                  out.append(line)
                  if len(" ".join(out)) > limit:
                      break
              return compact_value(" ".join(out), "", limit)

          def line_value(lines, keys, default="Update Soon", limit=220):
              for i, line in enumerate(lines):
                  low = line.lower()
                  if any(k in low for k in keys):
                      value = re.sub(r"^[^:：-]{0,80}[:：-]\s*", "", line).strip()
                      if value and value != line:
                          return compact_value(value, default, limit)
                      nxt = []
                      for item in lines[i + 1:i + 4]:
                          item_low = item.lower()
                          if any(stop in item_low for stop in ["application fee", "age limit", "qualification", "selection", "salary", "important link", "how to apply"]):
                              break
                          nxt.append(item)
                      return compact_value(" ".join(nxt), default, limit)
              return default

          def detail_map(lines):
              joined = " ".join(lines)
              dates = {
                  "Notification Release Date": first_clean_match(joined, [r"(?:notification|short notice).*?(\d{1,2}\s+[A-Za-z]+\s+\d{4})"], ""),
                  "Online Application Start Date": first_clean_match(joined, [r"Online\s+Apply\s+Start\s+Date\s+(\d{1,2}\s+[A-Za-z]+\s+\d{4})", r"(?:apply online|application|online apply).*?(?:start|starts|from).*?(\d{1,2}\s+[A-Za-z]+\s+\d{4})"], "") or line_value(lines, ["apply start", "application start", "online apply start"], ""),
                  "Last Date to Apply": first_clean_match(joined, [r"Online\s+Apply\s+Last\s+Date\s+(\d{1,2}\s+[A-Za-z]+\s+\d{4})", r"Apply\s+Online\s+Last\s+Date\s+(\d{1,2}\s+[A-Za-z]+\s+\d{4})", r"Last\s+Date\s+(?:to\s+Apply\s+)?(\d{1,2}\s+[A-Za-z]+\s+\d{4})"], "") or line_value(lines, ["last date", "online apply last"], ""),
                  "Fee Payment Last Date": first_clean_match(joined, [r"(?:fee payment|payment last).*?(\d{1,2}\s+[A-Za-z]+\s+\d{4})"], "") or line_value(lines, ["fee payment", "payment last"], ""),
                  "Exam / Merit List Date": first_clean_match(joined, [r"(?:exam date|merit list).*?(\d{1,2}\s+[A-Za-z]+\s+\d{4}|Notify Soon)"], "") or line_value(lines, ["exam date", "merit list"], ""),
                  "Admit Card / Result Date": first_clean_match(joined, [r"(?:admit card|result date).*?(\d{1,2}\s+[A-Za-z]+\s+\d{4}|Before Exam|Will Be Updated Here Soon)"], "") or line_value(lines, ["admit card", "result date"], ""),
              }
              return {k: (v or "Update Soon") for k, v in dates.items()}

          def smart_org(title, lines, text):
              joined = f"{title} {' '.join(lines[:80])} {text[:1000]}"
              if re.search(r"bank of baroda|\bbob\b", joined, re.I):
                  return "Bank of Baroda (BOB)"
              if re.search(r"railway|\brrb\b", joined, re.I):
                  return "Railway Recruitment Board (RRB)"
              if re.search(r"bihar police|csbc", joined, re.I):
                  return "Central Selection Board of Constable (CSBC), Bihar"
              return ""

          def smart_posts(title, text, fallback):
              matches = re.findall(r"([0-9][0-9,]*)\s*(?:Posts?|Vacancies)", f"{text} {title}", re.I)
              counts = []
              for raw in matches:
                  try:
                      num = int(raw.replace(",", ""))
                  except Exception:
                      continue
                  if 1900 <= num <= 2099:
                      continue
                  counts.append((num, raw))
              if counts:
                  return f"{counts[0][1]} Posts"
              return compact_value(fallback, "Update Soon", 120)

          def smart_qualification(title, text, fallback):
              joined = remove_source_noise(f"{title} {text}")
              if re.search(r"any graduate|graduate passed|graduation|bachelor", joined, re.I):
                  return "Any Graduate / Graduation passed from a recognized university."
              if re.search(r"10\+2|intermediate|12th", joined, re.I):
                  return "12th / Intermediate passed from a recognized board."
              if re.search(r"10th|matric", joined, re.I):
                  return "10th / Matric passed from a recognized board."
              return compact_value(fallback, "Check official notification for qualification details.", 220)

          def smart_fee(text, fallback):
              joined = remove_source_noise(text)
              gen = re.search(r"(?:General|OBC|EWS)[^₹]{0,120}(?:₹|Rs\.?\s*)\s*([0-9][0-9,\s]{0,8})", joined, re.I)
              sc = re.search(r"(?:SC\s*/\s*ST|SC|ST|Women|Female)[^₹]{0,120}(?:₹|Rs\.?\s*)\s*([0-9][0-9,\s]{0,8})", joined, re.I)
              pwd = re.search(r"(?:PWBD|PWD|Divyang)[^₹]{0,120}(?:₹|Rs\.?\s*)\s*([0-9][0-9,\s]{0,8})", joined, re.I)
              parts = []
              if gen:
                  parts.append(f"General / OBC / EWS: Rs. {re.sub(r'[^0-9]', '', gen.group(1))}")
              if sc:
                  parts.append(f"SC / ST / Women: Rs. {re.sub(r'[^0-9]', '', sc.group(1))}")
              if pwd:
                  parts.append(f"PWBD Candidates: Rs. {re.sub(r'[^0-9]', '', pwd.group(1))}")
              if parts:
                  parts.append("Payment Mode: Online through debit card, credit card, internet banking or other official payment options.")
                  return " | ".join(parts)
              return compact_value(fallback, "Check official notification for fee details.", 260)

          def fee_rows(fee):
              fee = remove_source_noise(fee)
              rows = []
              patterns = [
                  ("General / OBC / EWS", r"General\s*/\s*OBC\s*/\s*EWS\s*:\s*Rs\.\s*([0-9,]+)"),
                  ("SC / ST / Women", r"SC\s*/\s*ST\s*/\s*Women\s*:\s*Rs\.\s*([0-9,]+)"),
                  ("PWBD Candidates", r"PWBD\s+Candidates\s*:\s*Rs\.\s*([0-9,]+)"),
              ]
              for label, pat in patterns:
                  m = re.search(pat, fee, re.I)
                  rows.append((label, f"Rs. {m.group(1)}" if m else "As per official notification"))
              rows.append(("Payment Mode", "Online mode, if applicable"))
              return "".join(f"<tr><td>{html.escape(k)}</td><td>{html.escape(v)}</td></tr>" for k, v in rows)

          def rows_from_map(items):
              return "".join(f"<tr><td>{html.escape(k)}</td><td>{html.escape(v)}</td></tr>" for k, v in items.items())

          def content_style():
              return """<style>
              .tdj-table{width:100%;border-collapse:collapse;table-layout:auto}
              .tdj-table td,.tdj-table th{word-break:keep-all;overflow-wrap:normal;white-space:normal;vertical-align:top;line-height:1.6}
              .tdj-table td:first-child{font-weight:700;min-width:170px;width:28%}
              .tdj-table td:nth-child(2){width:72%}
              @media(max-width:640px){.tdj-table td,.tdj-table th{word-break:normal;overflow-wrap:anywhere}.tdj-table td:first-child{min-width:0;width:auto}.tdj-table td:nth-child(2){width:auto}}
              .tdj-link-btn{display:inline-block;background:#15803d;color:#fff!important;padding:9px 14px;border-radius:6px;font-weight:700;text-decoration:none;line-height:1.25;white-space:normal}
              .tdj-note{background:#fff7ed;border-left:4px solid #f97316;padding:10px 12px;margin:12px 0}
              </style>"""

          def make_title(title):
              t = clean_text(title)
              if "apply online" not in t.lower() and any(x in t.lower() for x in ["recruitment", "vacancy", "online form"]):
                  t += " Apply Online"
              return t[:140]

          def meta_description(title, labels, location):
              focus = make_title(title)
              category = labels[0] if labels else "Latest Jobs"
              desc = (
                  f"{focus} की complete details देखें: important dates, eligibility, fee, age limit, "
                  f"official links और latest {category} update. Location: {location}."
              )
              desc = clean_text(desc)
              if len(desc) > 155:
                  desc = desc[:152].rsplit(" ", 1)[0] + "..."
              return desc

          def update_kind(title, labels):
              low = title.lower()
              if "result" in low or "Results" in labels:
                  return "result"
              if "admit card" in low or "exam city" in low or "Admit Card" in labels:
                  return "admit_card"
              if "answer key" in low or "Answer Key" in labels:
                  return "answer_key"
              if "syllabus" in low or "Syllabus" in labels:
